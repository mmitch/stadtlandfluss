<html lang="de">
  <head>
    <meta charset="utf8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stadt Land Fluss</title>
    <style>
      #buchstabe {
        font-size: 1000%;
        margin-left: 0.3em;
      }
      header,
      footer {
        text-align: center;
      }
      footer {
        padding-top: 2em;
        font-size: 70%;
      }

      /* variable columns for main content */
      #flexbox {
        display: flex;
        margin: 0 1em;
        flex-direction: column;
      }
      section {
        width: 100%;
      }
      @media (min-width: 768px) {
        #flexbox {
          margin: 0 3em;
          gap: 2rem;
          flex-direction: row;
        }
        .filler {
          width: 100%;
        }
        section {
          min-width: 300px;
          max-width: 400px;
        }
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Stadt Land Fluss</h1>
    </header>

    <div id="flexbox">
      <div class="filler"></div>

      <section>
        <h2>Kategorien</h2>
        <ul>
          <li id="kategorie1">Stadt</li>
          <li id="kategorie2">Land</li>
          <li id="kategorie3">Fluss</li>
        </ul>
        <button onclick="wuerfeleKategorien()">đźŽ˛ WĂĽrfeln</button>
      </section>

      <section>
        <h2>Anfangsbuchstabe</h2>
        <div id="buchstabe">?</div>
        <button onclick="wuerfeleBuchstabe()">đźŽ˛ WĂĽrfeln</button>
        <select id="buchstabenliste"></select>
      </section>

      <div class="filler"></div>
    </div>

    <footer>
      2026 &copy; <a href="https://www.cgarbs.de">Christian Garbs</a>; licensed
      under <a href="https://www.gnu.org/licenses/">GNU GPL v3</a>; source code,
      bug reports etc. <a href="https://github.com/mmitch/slf">on GitHub</a
      ><!-- COMMIT -->
    </footer>
  </body>

  <script>
    const kategorien = [
      "Stadt",
      "Land",
      "Fluss",
      "bei Omi",
      "das war schon immer so",
      "davon kann man sterben",
      "Essen",
      "Farbe",
      "im Keller",
      "in der Rumpelschublade",
      "in der Schule",
      "Kleidung",
      "nervige Nachbarn",
      "Pflanzen",
      "Schul-/Studienfach",
      "Tier",
      "unter Wasser",
      "Verkehrsmittel",
      "VĂ¶gel",
      "was Piraten tun",
    ];

    const buchstabenListen = [
      {
        name: "A-Z ohne QVXY",
        buchstaben: [
          "A",
          "B",
          "C",
          "D",

          "S",

          "U",
          "W",
          "Z",
        ],
      },
      {

        ],
      },
    ];

    // befĂĽlle die Buchstabenlisten-Auswahl
    buchstabenListen.forEach((buchstabenListe) => {
      const option = document.createElement("option");
      const text = document.createTextNode(buchstabenListe.name);
      option.appendChild(text);
      document.getElementById("buchstabenliste").appendChild(option);
    });

    function gibAusListe(liste) {
      return liste[Math.floor(Math.random() * liste.length)];
    }

    function wuerfeleKategorien() {
      ["kategorie1", "kategorie2", "kategorie3"].forEach(
        (id) =>
          (document.getElementById(id).textContent = gibAusListe(kategorien)),
      );
    }

    function wuerfeleBuchstabe() {
      const auswahl = document.getElementById("buchstabenliste").selectedIndex;
      const buchstabenListe = buchstabenListen[auswahl];
      const neuerBuchstabe = gibAusListe(buchstabenListe.buchstaben);
      document.getElementById("buchstabe").textContent = neuerBuchstabe;
    }
  </script>
</html>
