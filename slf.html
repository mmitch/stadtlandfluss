<html lang="de">
  <head>
    <meta charset="utf8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Stadt Land Fluss</title>
    <style>
      body {
        margin: 1em;
      }
      #buchstabe {
        font-size: 900%;
      }
      header,
      footer {
        text-align: center;
      }
      footer {
        padding-top: 2em;
        font-size: 70%;
      }
      section {
        text-align: center;
        padding: 0 1em;
      }
      ul {
        list-style: none;
        padding: 0;
      }
      ul > li {
        padding-bottom: 0.5em;
        line-height: 95%;
      }

      /* variable layout for main content */
      #grid-container {
        /* mobile first: one column vertical */
        display: grid;
        grid-template:
          "filler-left"
          "kategorien"
          "buchstaben"
          "filler-right";
      }
      @media (min-width: 27em) {
        /* when the max size of the sections is reached (25em) plus some global margin (2*1em),
           add the fillers to the left and right to center the single column with a fixed width of 25em */
        #grid-container {
          grid-template:
            "filler-left kategorien filler-right"
            "filler-left buchstaben filler-right"
            / 1fr 25em 1fr;
        }
      }
      @media (min-width: 55em) {
        /* with enough space for both columns (don't break at 52em yet, it does not look good),
           put both sections side to side and keep the fillers */
        #grid-container {
          grid-template:
            "filler-left kategorien buchstaben filler-right"
            / 1fr 25em 25em 1fr;
        }
      }

      /* colors */
      :root {
        --color-bg: #f7f2d4;
        --color-fg: #483b3f;
        --color-fg-light: #81777a;
        --color-button-bg: #247771;
        --color-button-fg: #f7f2d4;
        --color-link: #247771;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --color-bg: #483b3f;
          --color-fg: #f7f2d4;
          --color-fg-light: #9d9a88;
          --color-button-bg: #3286c0;
          --color-button-fg: #f7f2d4;
          --color-link: #3498db;
        }
      }
      body {
        background-color: var(--color-bg);
        color: var(--color-fg);
      }
      footer {
        color: var(--color-fg-light);
      }
      a {
        color: var(--color-link);
      }
      button,
      select {
        background-color: var(--color-button-bg);
        color: var(--color-button-fg);
        border: none;
        padding: 0.5em 0.7em;
        cursor: pointer;
        border-radius: 0.4em;
      }
      button {
        font-weight: bold;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Stadt Land Fluss</h1>
    </header>

    <div id="grid-container">
      <div style="grid-area: filler-left"></div>

      <section style="grid-area: kategorien">
        <h2>Kategorien</h2>
        <ul>
          <li id="kategorie1">Stadt</li>
          <li id="kategorie2">Land</li>
          <li id="kategorie3">Fluss</li>
        </ul>
        <button onclick="wuerfeleKategorien()">🎲 Würfeln</button>
      </section>

      <section style="grid-area: buchstaben">
        <h2>Anfangsbuchstabe</h2>
        <div id="buchstabe">?</div>
        <button onclick="wuerfeleBuchstabe()">🎲 Würfeln</button>
        <select id="buchstabenliste"></select>
      </section>

      <div style="grid-area: filler-right"></div>
    </div>

    <footer>
      2026 &copy; <a href="https://www.cgarbs.de">Christian Garbs</a>; licensed
      under <a href="https://www.gnu.org/licenses/">GNU GPL v3</a>; source code,
      bug reports etc. <a href="https://github.com/mmitch/stadtlandfluss">on GitHub</a
      ><!-- COMMIT -->
    </footer>
  </body>

    // befülle die Buchstabenlisten-Auswahl
    buchstabenListen.forEach((buchstabenListe) => {
      const option = document.createElement("option");
      const text = document.createTextNode(buchstabenListe.name);
      option.appendChild(text);
      document.getElementById("buchstabenliste").appendChild(option);
    });

    function gibAusListe(liste) {
      return liste[Math.floor(Math.random() * liste.length)];
    }

    function wuerfeleKategorien() {
      ["kategorie1", "kategorie2", "kategorie3"].forEach(
        (id) =>
          (document.getElementById(id).textContent = gibAusListe(kategorien)),
      );
    }

    function wuerfeleBuchstabe() {
      const auswahl = document.getElementById("buchstabenliste").selectedIndex;
      const buchstabenListe = buchstabenListen[auswahl];
      const neuerBuchstabe = gibAusListe(buchstabenListe.buchstaben);
      document.getElementById("buchstabe").textContent = neuerBuchstabe;
    }
  </script>
</html>
